<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a472a"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/></filter>
  </defs>
  <rect width="1280" height="500" fill="#f8fafc"/>
  <rect x="20" y="16" width="1240" height="52" rx="8" fill="#374151"/>
  <text x="40" y="48" fill="white" font-size="19" font-weight="bold">🔗 WF06 — Integração CRM/ERP — Adaptador Universal</text>
  <text x="1080" y="48" fill="#d1d5db" font-size="13">11 nós · ATIVO</text>

  <!-- Triggers -->
  <rect x="20" y="100" width="160" height="70" rx="8" fill="white" stroke="#6366f1" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="100" width="160" height="8" rx="8" fill="#6366f1"/>
  <text x="100" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">⚡ Webhook</text>
  <text x="100" y="148" text-anchor="middle" font-size="11" fill="#64748b">agroe-crm-entrada</text>
  <text x="100" y="163" text-anchor="middle" font-size="10" fill="#94a3b8">HTTP POST externo</text>

  <rect x="20" y="196" width="160" height="70" rx="8" fill="white" stroke="#94a3b8" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="196" width="160" height="8" rx="8" fill="#94a3b8"/>
  <text x="100" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">🔄 executeWorkflow</text>
  <text x="100" y="244" text-anchor="middle" font-size="11" fill="#64748b">Trigger Interno</text>
  <text x="100" y="259" text-anchor="middle" font-size="10" fill="#94a3b8">WF01/WF02 → WF06</text>

  <!-- Registra Fila -->
  <rect x="225" y="100" width="170" height="70" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <rect x="225" y="100" width="170" height="8" rx="8" fill="#8b5cf6"/>
  <text x="310" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">🗄️ Registra Fila</text>
  <text x="310" y="148" text-anchor="middle" font-size="11" fill="#64748b">agroe_integracao_fila</text>
  <text x="310" y="163" text-anchor="middle" font-size="10" fill="#94a3b8">status = 'pendente'</text>

  <!-- Normaliza -->
  <rect x="440" y="148" width="190" height="80" rx="8" fill="white" stroke="#1a472a" stroke-width="2" filter="url(#sh)"/>
  <rect x="440" y="148" width="190" height="8" rx="8" fill="#1a472a"/>
  <text x="535" y="176" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">⚙️ Normaliza Payload</text>
  <text x="535" y="194" text-anchor="middle" font-size="11" fill="#64748b">Schema padronizado</text>
  <text x="535" y="210" text-anchor="middle" font-size="10" fill="#94a3b8">meta · entidade · conteudo</text>
  <text x="535" y="222" text-anchor="middle" font-size="10" fill="#94a3b8">cliente · rastreabilidade</text>

  <!-- Resposta webhook -->
  <rect x="440" y="258" width="190" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="535" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">✅ Resposta 200 OK</text>
  <text x="535" y="303" text-anchor="middle" font-size="11" fill="#64748b">respondToWebhook</text>

  <!-- Switch -->
  <rect x="680" y="148" width="140" height="80" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <rect x="680" y="148" width="140" height="8" rx="8" fill="#f59e0b"/>
  <text x="750" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">🔀 Switch</text>
  <text x="750" y="200" text-anchor="middle" font-size="11" fill="#64748b">por conector_id</text>
  <text x="750" y="218" text-anchor="middle" font-size="10" fill="#94a3b8">5 saídas possíveis</text>

  <!-- 5 conectores -->
  <rect x="870" y="80" width="170" height="56" rx="8" fill="white" stroke="#25D366" stroke-width="2" filter="url(#sh)"/>
  <text x="955" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">🟢 Webhook Custom</text>
  <text x="955" y="124" text-anchor="middle" font-size="10" fill="#64748b">ATIVO — CUSTOM_WEBHOOK_URL</text>

  <rect x="870" y="152" width="170" height="56" rx="8" fill="white" stroke="#f97316" stroke-width="1.5" filter="url(#sh)"/>
  <text x="955" y="179" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">🟡 HubSpot CRM</text>
  <text x="955" y="196" text-anchor="middle" font-size="10" fill="#64748b">Configurado · HUBSPOT_API_KEY</text>

  <rect x="870" y="224" width="170" height="56" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="955" y="251" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">🔵 Salesforce</text>
  <text x="955" y="268" text-anchor="middle" font-size="10" fill="#64748b">Configurado · OAuth2</text>

  <rect x="870" y="296" width="170" height="56" rx="8" fill="white" stroke="#6366f1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="955" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">🟣 Siagri ERP Agro</text>
  <text x="955" y="340" text-anchor="middle" font-size="10" fill="#64748b">Configurado · SIAGRI_API_KEY</text>

  <rect x="870" y="368" width="170" height="56" rx="8" fill="white" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="955" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">⚫ TOTVS / AgroSmart</text>
  <text x="955" y="412" text-anchor="middle" font-size="10" fill="#64748b">Configurados · OAuth2 / API Key</text>

  <!-- teste real box -->
  <rect x="1080" y="200" width="180" height="90" rx="8" fill="white" stroke="#1a472a" stroke-width="2"/>
  <text x="1170" y="224" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a472a">✅ Teste Real</text>
  <text x="1170" y="244" text-anchor="middle" font-size="11" fill="#334155">HTTP 200 OK</text>
  <text x="1170" y="262" text-anchor="middle" font-size="11" fill="#334155">930ms resposta</text>
  <text x="1170" y="280" text-anchor="middle" font-size="10" fill="#64748b">27/05/2026</text>

  <!-- arrows -->
  <line x1="180" y1="135" x2="223" y2="135" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="395" y1="135" x2="438" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="231" x2="438" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="188" x2="678" y2="188" stroke="#1a472a" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="535" y1="228" x2="535" y2="256" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- switch to connectors -->
  <line x1="820" y1="175" x2="868" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="185" x2="868" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="195" x2="868" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="205" x2="868" y2="324" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="215" x2="868" y2="396" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="640" y="482" text-anchor="middle" fill="#94a3b8" font-size="12">© 2026 Andre Fernandes · agro-e v1.0 · WF06 de 6 workflows</text>
</svg>