<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/></filter>
  </defs>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="20" y="16" width="1160" height="52" rx="8" fill="#7f1d1d"/>
  <text x="40" y="48" fill="white" font-size="19" font-weight="bold">🆘 WF03 — Escalada para Responsável Humano</text>
  <text x="1020" y="48" fill="#fca5a5" font-size="13">13 nós · ATIVO</text>

  <!-- Trigger -->
  <rect x="30" y="100" width="160" height="70" rx="8" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="100" width="160" height="8" rx="8" fill="#ef4444"/>
  <text x="110" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">⚡ executeWorkflow</text>
  <text x="110" y="156" text-anchor="middle" font-size="11" fill="#64748b">Trigger Escalada</text>

  <!-- Busca Contexto -->
  <rect x="230" y="100" width="170" height="70" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <rect x="230" y="100" width="170" height="8" rx="8" fill="#8b5cf6"/>
  <text x="315" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">🗄️ Busca Contexto</text>
  <text x="315" y="156" text-anchor="middle" font-size="11" fill="#64748b">Supabase agroe_contexto</text>

  <!-- Pausa IA -->
  <rect x="450" y="100" width="170" height="70" rx="8" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <rect x="450" y="100" width="170" height="8" rx="8" fill="#ef4444"/>
  <text x="535" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">⏸️ Pausa IA</text>
  <text x="535" y="152" text-anchor="middle" font-size="11" fill="#64748b">ai_service = 'pause'</text>
  <text x="535" y="165" text-anchor="middle" font-size="10" fill="#94a3b8">Supabase UPDATE</text>

  <!-- Monta Mensagem -->
  <rect x="670" y="100" width="170" height="70" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <rect x="670" y="100" width="170" height="8" rx="8" fill="#f59e0b"/>
  <text x="755" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">📝 Monta Mensagem</text>
  <text x="755" y="156" text-anchor="middle" font-size="11" fill="#64748b">Contexto + Score + Ação</text>

  <!-- Notifica Responsável -->
  <rect x="890" y="100" width="170" height="70" rx="8" fill="white" stroke="#25D366" stroke-width="2" filter="url(#sh)"/>
  <rect x="890" y="100" width="170" height="8" rx="8" fill="#25D366"/>
  <text x="975" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">📱 Notifica Resp.</text>
  <text x="975" y="152" text-anchor="middle" font-size="11" fill="#64748b">WhatsApp responsável</text>
  <text x="975" y="165" text-anchor="middle" font-size="10" fill="#94a3b8">Evolution API</text>

  <!-- Retomada -->
  <rect x="450" y="250" width="390" height="80" rx="8" fill="white" stroke="#1a472a" stroke-width="2" filter="url(#sh)"/>
  <rect x="450" y="250" width="390" height="8" rx="8" fill="#1a472a"/>
  <text x="645" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">🔄 Retomada Automática</text>
  <text x="645" y="302" text-anchor="middle" font-size="11" fill="#64748b">Responsável atualiza status → ai_service='active' → IA retoma</text>
  <text x="645" y="318" text-anchor="middle" font-size="10" fill="#94a3b8">Compatível com: Evolution API · UAZAPI · ZAPI</text>

  <!-- arrows -->
  <line x1="190" y1="135" x2="228" y2="135" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="400" y1="135" x2="448" y2="135" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="620" y1="135" x2="668" y2="135" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="860" y1="135" x2="888" y2="135" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="645" y1="248" x2="645" y2="200" stroke="#1a472a" stroke-width="1.5" stroke-dasharray="5,3"/>

  <text x="600" y="398" text-anchor="middle" fill="#94a3b8" font-size="12">© 2026 Andre Fernandes · agro-e v1.0 · WF03 de 6 workflows</text>
</svg>